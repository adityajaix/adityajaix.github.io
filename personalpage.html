<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Jaiswal</title>
    <style>
        /* Default is dark */
        :root {
            --bg: #0f0f0f;
            --text: #f0f0f0;
            --accent: #4f8ef7;
            --muted: #888;
        }

        /* Light mode overrides just the variables */
        body.light {
            --bg: #f5f5f5;
            --text: #111;
            --accent: #4f8ef7;
            --muted: #555;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .card {
            text-align: center;
        }

        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid var(--muted);
            color: var(--text);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #theme-toggle:hover {
            border-color: var(--accent);
        }

        .tagline {
            color: var(--muted);
        }

        .links a {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--muted);
            padding: 8px 16px;
            margin: 0 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .links {
            margin-bottom: 30px;
        }

        .links a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .contact {
            color: var(--accent);
            text-decoration: none;
        }

        .contact:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="card">
        <button id="theme-toggle">☀️</button>
        <h1>Aditya Jaiswal</h1>
        <p class="tagline">Building web experiences</p>

        <div class="links">
            <a href="https://github.com/adityajaix" target="_blank">Github</a>
            <a href="https://adityajaix.itch.io" target="_blank">Itch.io</a>
        </div>

        <a class="contact" href="mailto:adityajaix@gmail.com">adityajaix@gmail.com</a>
    </div>

</body>

<script>
    const toggle = document.getElementById('theme-toggle');
    toggle.addEventListener('click', () => {
        document.body.classList.toggle('light');
        toggle.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
    });
</script>

</html>
